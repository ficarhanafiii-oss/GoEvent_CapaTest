<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account - GoEvent</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/register.css" />
</head>
<body>
  <div class="auth-header">
    <h2>Create Account</h2>
  </div>

  <div class="auth-body">
    <div class="logo-circle">
      <div class="logo-inner">
        <div class="logo-go">GO</div>
        <div class="logo-event">EVENT</div>
      </div>
    </div>

    <h1 class="auth-title">Welcome!</h1>
    <p class="auth-subtitle">Sign up to book your favorite events</p>

    <div class="form-group">
      <label class="form-label">Full Name</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input id="name" type="text" placeholder="Nama lengkap kamu" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label uppercase">EMAIL</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
        <input id="email" type="email" placeholder="abcd@gmail.com" />
      </div>
      <div class="field-error" id="emailErr">Email ini sudah terdaftar!</div>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input id="password" type="password" placeholder="Min. 6 karakter" />
        <button class="eye-btn" onclick="toggleEye(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="20" height="20">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="field-hint">Minimal 6 karakter</div>
    </div>

    <button class="btn-primary" id="registerBtn" onclick="doRegister()">Sign up</button>

    <div class="divider">or</div>

    <button class="btn-google" onclick="doGoogleLogin(event)">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign up with Google
    </button>

    <p class="auth-footer">Already have an account? <a href="login.html">Log in now</a></p>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/register.js"></script>
</body>
</html>
