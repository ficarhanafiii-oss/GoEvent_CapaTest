<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose Tickets - GoEvent</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/choose-tickets.css" />
</head>
<body>
  <div class="page-header">
    <button class="back-icon-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <h1>Choose Tickets</h1>
    <div class="header-spacer"></div>
  </div>

  <div class="content-scroll">

    <div class="section-card">
      <div class="event-label">EVENT</div>
      <div class="event-title" id="event-title">Hindia Pop Music Concert</div>
      <div class="event-meta-text" id="event-meta">28 Apr • 19.00 • Jakarta</div>
    </div>

    <div class="section-card">
      <div class="ticket-section-title">SELECT TICKETS</div>
      <div id="ticket-types-container"></div>
    </div>

    <div class="section-card">
      <div class="order-label">ORDER SUMMARY</div>
      <div id="order-summary-lines">
        <div class="summary-empty">No tickets selected</div>
      </div>
    </div>

  </div>

  <div class="bottom-action">
    <div class="total-info">
      <div class="label">Subtotal Payment</div>
      <div class="amount" id="bottom-total">Rp.0</div>
    </div>
    <button class="btn-continue" id="btn-continue" disabled onclick="goToPayment()">Continue</button>
  </div>
  <script src="js/choose-tickets.js"></script>
</body>
</html>
