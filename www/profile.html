  <div class="logout-wrap">
    <button class="btn-logout" onclick="confirmLogout()">Log Out</button>
  </div>

  <div id="logoutModal" style="
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.45); z-index:200;
    align-items:flex-end; justify-content:center;
  ">
    <div style="
      background:white; border-radius:24px 24px 0 0;
      width:100%; max-width:480px;
      padding:28px 24px 36px; text-align:center;
    ">
      <div style="width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 20px;"></div>
      <div style="width:64px;height:64px;border-radius:50%;background:#fff0f0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#e53935" stroke-width="2.2">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </div>
      <div style="font-size:18px;font-weight:800;margin-bottom:8px;color:#111;">Keluar dari Akun?</div>
      <div style="font-size:13px;color:#888;margin-bottom:24px;line-height:1.6;">
        Kamu akan keluar dari GoEvent.<br/>Yakin ingin melanjutkan?
      </div>
      <div style="display:flex;gap:10px;">
        <button onclick="closeLogout()" style="
          flex:1;background:white;color:#111;font-size:15px;font-weight:700;
          border:2px solid #e0e0e0;border-radius:28px;padding:14px;
          cursor:pointer;font-family:inherit;
        ">Batal</button>
        <button onclick="doLogout()" style="
          flex:1;background:#e53935;color:white;font-size:15px;font-weight:700;
          border:none;border-radius:28px;padding:14px;
          cursor:pointer;font-family:inherit;
        ">Ya, Keluar</button>
      </div>
    </div>
  </div>
