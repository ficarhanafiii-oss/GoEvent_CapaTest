<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose Seats - GoEvent</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/seminar-choose-seats.css" />
</head>
<body>

  <div class="page-header">
    <button class="back-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="2.5">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <h1>Choose Tickets</h1>
    <div class="spacer"></div>
  </div>

  <div class="content-scroll">

    <div class="event-card">
      <div class="ev-label">EVENT</div>
      <div class="ev-title" id="ev-title">Indonesia Tech Summit 2026</div>
      <div class="ev-meta"  id="ev-meta">15 Jun • 08.00 • Jakarta</div>
    </div>

    <div class="legend">
      <div class="leg-item">
        <div class="leg-box"></div>
        <span>Available</span>
      </div>
      <div class="leg-item">
        <div class="leg-box sel"></div>
        <span>Selected</span>
      </div>
      <div class="leg-item">
        <div class="leg-box taken"></div>
        <span>Taken</span>
      </div>
    </div>

    <div class="stage">STAGE / PODIUM</div>

    <div class="seat-scroll">
      <div class="seat-grid" id="seat-grid"></div>
    </div>

    <div class="summary-card">
      <div class="sum-label">ORDER SUMMARY</div>
      <div class="sum-row">
        <span id="sum-count">0 Ticket / 0 Seats</span>
        <span id="sum-price">Rp.0</span>
      </div>
      <div class="sum-row sub-total">
        <span>Subtotal</span>
        <span id="sum-subtotal">Rp.0</span>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <div class="bar-info">
      <div class="bar-seats">Seats: <strong id="bar-seats-list">-</strong></div>
      <div class="bar-sub-label">Subtotal Payment</div>
      <div class="bar-amount" id="bar-amount">Rp.0</div>
    </div>
    <button class="btn-continue" id="btn-go" disabled onclick="goToPayment()">Continue</button>
  </div>
  <script src="js/seminar-choose-seats.js"></script>
</body>
</html>
