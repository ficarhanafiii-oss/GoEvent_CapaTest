<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saved - GoEvent</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/saved.css" />
</head>
<body>
  <div class="page-header">
    <h1>Saved</h1>
  </div>

  <div class="saved-list page-content" id="savedList">

  </div>

  <nav class="bottom-nav">
    <a href="home.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </div>
      EXPLORE
    </a>
    <a href="tickets.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="1" y="7" width="22" height="10" rx="2"/><path d="M8 7v10M16 7v10"/>
        </svg>
      </div>
      TICKETS
    </a>
    <a href="saved.html" class="nav-item active">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>
      </div>
      SAVED
    </a>
    <a href="profile.html" class="nav-item">
      <div class="nav-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </div>
      PROFILE
    </a>
  </nav>

  <div class="overlay-backdrop" id="backdrop" onclick="closeDetail()"></div>

  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-hero">
      <div class="drag-handle-wrap"><div class="drag-handle"></div></div>
      <img id="detailImg" src="" alt="" />
      <button class="back-btn" onclick="closeDetail()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <button class="detail-fav-btn" id="detailFavBtn" onclick="toggleDetailFav()">
        <svg id="detailFavSvg" viewBox="0 0 24 24" fill="#e53935" stroke="#e53935" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>
      </button>
      <div class="detail-badge-pos"><div class="detail-badge" id="detailBadge"></div></div>
    </div>
    <div class="detail-body">
      <h1 id="detailTitle"></h1>
      <div class="info-row">
        <div class="info-box">
          <div class="info-box-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          </div>
          <div class="info-box-text"><span>Date & Time</span><strong id="detailDate"></strong></div>
        </div>
        <div class="info-box">
          <div class="info-box-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="#e53935"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          </div>
          <div class="info-box-text"><span>Location</span><strong id="detailLocation"></strong></div>
        </div>
      </div>
      <div class="about-section">
        <h2>About Event</h2>
        <p id="detailAbout"></p>
      </div>
      <div class="divider-line"></div>
      <div class="organizer">
        <div class="organizer-logo"><img id="detailOrgImg" src="" alt="" /></div>
        <div class="organizer-info">
          <h3 id="detailOrgName"></h3>
          <span>Verified Organizer</span>
        </div>
      </div>
    </div>
    <div class="detail-bottom-bar">
      <div class="price-block"><span>Starting From</span><strong id="detailPrice"></strong></div>
      <button class="btn-book">Book Now</button>
    </div>
  </div>

  <script src="js/saved.js"></script>
</body>
</html>
