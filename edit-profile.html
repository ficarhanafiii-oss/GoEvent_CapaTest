<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Profile - GoEvent</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/edit-profile.css" />
</head>
<body>

  <div class="top-bar">
    <button class="back-btn" onclick="history.back()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <h2>Edit Profile</h2>
  </div>

  <div class="avatar-section">
    <div class="avatar-wrap">
      <div class="avatar-circle" id="avatarCircle">F</div>
      <div class="avatar-edit-btn" onclick="document.getElementById('photoInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
    </div>
    <p>Tap untuk ganti foto</p>
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoChange(event)"/>
  </div>

  <div class="form-section">
    <p class="section-title">Informasi Pribadi</p>

    <div class="form-group">
      <label>Nama Lengkap</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="inputName" value="Ficar Hanafi" placeholder="Nama lengkap"/>
      </div>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="inputUsername" value="ficarhanafi" placeholder="Username"/>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input type="email" id="inputEmail" value="ficarhanafiii@gmail.com" placeholder="Email"/>
      </div>
    </div>

    <div class="form-group">
      <label>Nomor HP</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.14a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
        <input type="tel" id="inputPhone" value="+62 812-3456-7890" placeholder="Nomor HP"/>
      </div>
    </div>

    <p class="section-title" style="margin-top:6px;">Lokasi</p>

    <div class="form-group">
      <label>Kota</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <input type="text" id="inputCity" value="Karawang" placeholder="Kota"/>
      </div>
    </div>
  </div>

  <button class="btn-save" onclick="saveProfile()">Simpan Perubahan</button>

  <div class="toast" id="toast">✓ Profil berhasil diperbarui</div>

  <script src="js/edit-profile.js"></script>
</body>
</html>
